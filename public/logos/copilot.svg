<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Microsoft Copilot">
  <defs>
    <!-- Pezzo sinistro/esterno: blu -> verde -> giallo -> arancione -->
    <linearGradient id="cL" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#00B4F0"/>
      <stop offset="35%"  stop-color="#7ED321"/>
      <stop offset="70%"  stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#F06A1E"/>
    </linearGradient>
    <!-- Pezzo destro/interno: viola -> rosa -> arancione -->
    <linearGradient id="cR" x1="0.9" y1="0" x2="0.1" y2="1">
      <stop offset="0%"   stop-color="#9B5DD4"/>
      <stop offset="45%"  stop-color="#FF6FB0"/>
      <stop offset="100%" stop-color="#F06A1E"/>
    </linearGradient>
  </defs>

  <!-- Pezzo sinistro: C-shape che va da top-left intorno al bottom -->
  <path d="
    M 20 10
    Q 10 10 10 20
    L 10 80
    Q 10 90 20 90
    L 55 90
    Q 65 90 65 80
    L 65 68
    Q 65 60 57 60
    L 43 60
    Q 35 60 35 68
    L 35 72
    Q 35 78 29 78
    L 22 78
    Q 22 78 22 70
    L 22 30
    Q 22 22 30 22
    L 78 22
    Q 78 28 78 32
    L 78 40
    Q 78 48 72 48
    L 57 48
    Q 48 48 48 40
    L 48 32
    Q 48 22 58 22
    L 80 22
    Q 90 22 90 32
    L 90 80
    Q 90 90 80 90
    L 45 90
    Q 35 90 35 80
    L 35 68
  " fill="none"/>

  <!-- Semplificato: due forme rettangolari con angoli arrotondati che si incrociano -->
  <!-- Pezzo BLU-VERDE-GIALLO-ARANCIONE (sinistro, va dall'alto in basso a destra) -->
  <path d="
    M 18 8 Q 8 8 8 18 L 8 58 Q 8 68 18 68 L 48 68 Q 58 68 58 58 L 58 48 Q 58 42 52 42 L 32 42 Q 22 42 22 32 L 22 22 Q 22 14 30 14 L 82 14 Q 92 14 92 24 L 92 28 Q 92 38 82 38 L 52 38
  " fill="none" stroke="url(#cL)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pezzo VIOLA-ROSA-ARANCIONE (destro, va dall'alto in basso a sinistra) -->
  <path d="
    M 82 92 Q 92 92 92 82 L 92 42 Q 92 32 82 32 L 52 32 Q 42 32 42 42 L 42 52 Q 42 58 48 58 L 68 58 Q 78 58 78 68 L 78 78 Q 78 86 70 86 L 18 86 Q 8 86 8 76 L 8 72 Q 8 62 18 62 L 48 62
  " fill="none" stroke="url(#cR)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
